name: Tankstations bijwerken
 
on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
 
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Pakketten installeren
        run: pip install requests
 
      - name: Prijzen ophalen van ANWB
        run: python scraper.py
 
      - name: Opslaan in repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prijzen.json
          git diff --staged --quiet || git commit -m "Prijzen bijgewerkt $(date +'%Y-%m-%d %H:%M')"
          git push
