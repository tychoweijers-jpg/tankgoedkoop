name: Brandstofprijzen bijwerken
 
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
 
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Pakketten installeren
        run: pip install requests beautifulsoup4
 
      - name: Tankstations ophalen (alleen als bestand niet bestaat of ouder dan 7 dagen)
        run: |
          python -c "
import os, time, requests, json
 
bestand = 'tankstations.json'
max_oud = 7 * 24 * 3600  # 7 dagen
 
if os.path.exists(bestand) and (time.time() - os.path.getmtime(bestand)) < max_oud:
    print('Tankstations zijn recent, overslaan')
    exit()
 
print('Tankstations ophalen via OpenStreetMap...')
query = '''
[out:json][timeout:60];
area[\"ISO3166-1\"=\"NL\"]->.nl;
node[\"amenity\"=\"fuel\"](area.nl);
out body;
'''
 
MERK_MAP = {
    'shell': 'Shell', 'bp': 'BP', 'esso': 'Esso', 'tango': 'Tango',
    'tinq': 'Tinq', 'tamoil': 'Tamoil', 'gulf': 'Gulf', 'avia': 'Avia',
    'texaco': 'Texaco', 'total': 'Total', 'q8': 'Q8', 'omo': 'Omo',
    'calpam': 'Calpam', 'argos': 'Argos',
}
 
res = requests.post('https://overpass-api.de/api/interpreter', data={'data': query}, timeout=90)
elements = res.json().get('elements', [])
print(f'{len(elements)} tankstations gevonden')
 
stations = []
for el in elements:
    tags = el.get('tags', {})
    lat, lon = el.get('lat'), el.get('lon')
    if not lat or not lon:
        continue
    naam_raw = (tags.get('brand') or tags.get('name') or tags.get('operator') or 'Onbekend').strip()
    naam_lower = naam_raw.lower()
    merk = 'Onbekend'
    for key, val in MERK_MAP.items():
        if key in naam_lower:
            merk = val
            break
    straat = tags.get('addr:street', '')
    huisnr = tags.get('addr:housenumber', '')
    stad = tags.get('addr:city', tags.get('addr:place', ''))
    adres = f'{straat} {huisnr}'.strip() if straat else naam_raw
    stations.append({'naam': naam_raw, 'merk': merk, 'adres': adres, 'stad': stad,
                     'postcode': tags.get('addr:postcode',''), 'lat': lat, 'lon': lon})
 
with open(bestand, 'w', encoding='utf-8') as f:
    json.dump(stations, f, ensure_ascii=False)
print(f'{len(stations)} tankstations opgeslagen')
"
 
      - name: Brandstofprijzen scrapen
        run: python scraper.py
 
      - name: Wijzigingen opslaan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prijzen.json tankstations.json
          git diff --staged --quiet || git commit -m "Prijzen bijgewerkt $(date +'%Y-%m-%d')"
          git push
