<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TankGoedkoop</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
    .header{background:white;padding:1.25rem 1.5rem;border-bottom:1px solid #e8e8e5}
    .logo{font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px}
    .logo-dot{width:10px;height:10px;border-radius:50%;background:#E24B4A;display:inline-block}
    .tagline{font-size:13px;color:#888;margin-top:2px}
    .container{max-width:700px;margin:0 auto;padding:1.5rem 1rem 3rem}
    .search-box{background:white;border-radius:12px;border:1px solid #e8e8e5;padding:1.25rem;margin-bottom:1rem}
    .search-row{display:flex;gap:8px;flex-wrap:wrap}
    .search-row input{flex:1;min-width:150px;padding:10px 14px;border:1px solid #e0e0db;border-radius:8px;font-size:14px;outline:none}
    .search-row input:focus{border-color:#E24B4A}
    .search-row select{padding:10px 12px;border:1px solid #e0e0db;border-radius:8px;font-size:14px;background:white;outline:none}
    .search-row button{padding:10px 20px;background:#E24B4A;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
    .search-row button:hover{background:#c43b3a}
    .locatie-btn{margin-top:8px;background:none;border:1px solid #e0e0db;border-radius:8px;padding:8px 14px;font-size:13px;color:#666;cursor:pointer;width:100%}
    .locatie-btn:hover{background:#f5f5f3}
    .radius-row{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:13px;color:#666}
    .radius-row input[type=range]{flex:1}
    .hint{font-size:13px;color:#888;margin-top:8px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
    .stat{background:white;border-radius:10px;border:1px solid #e8e8e5;padding:.85rem 1rem}
    .stat-val{font-size:20px;font-weight:600}
    .stat-lbl{font-size:12px;color:#888;margin-top:2px}
    .results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;font-size:13px;color:#888}
    .stations{display:flex;flex-direction:column;gap:10px}
    .card{background:white;border-radius:12px;border:1px solid #e8e8e5;padding:1rem 1.25rem;display:flex;align-items:center;gap:16px}
    .card:hover{border-color:#ccc}
    .card.cheapest{border:2px solid #E24B4A}
    .logo-box{width:46px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .info{flex:1;min-width:0}
    .name{font-size:15px;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:6px}
    .badge{font-size:11px;padding:3px 8px;border-radius:6px;background:#FCEBEB;color:#A32D2D;font-weight:500}
    .address{font-size:13px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dist{font-size:12px;color:#aaa;margin-top:2px}
    .prices{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
    .price-main{font-size:22px;font-weight:700}
    .price-lbl{font-size:11px;color:#aaa}
    .price-other{font-size:12px;color:#aaa}
    .updated{font-size:12px;color:#aaa;margin-top:1.25rem;text-align:center}
    .msg{text-align:center;padding:2rem;color:#888;font-size:14px}
    .err{text-align:center;padding:1rem;color:#A32D2D;font-size:14px;background:#FFEBEE;border-radius:8px}
  </style>
</head>
<body>
<div class="header">
  <div class="logo"><span class="logo-dot"></span> TankGoedkoop</div>
  <div class="tagline">Actuele brandstofprijzen per tankstation</div>
</div>
<div class="container">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="zoek" placeholder="Postcode of stad (bijv. 1011 of Amsterdam)..."/>
      <select id="brandstof">
        <option value="EURO95">Euro 95</option>
        <option value="DIESEL">Diesel</option>
        <option value="AUTOGAS">LPG</option>
        <option value="EURO98">Euro 98</option>
      </select>
      <button onclick="doZoek()">Zoek</button>
    </div>
    <button class="locatie-btn" onclick="gebruikLocatie()">📍 Gebruik mijn huidige locatie</button>
    <div class="radius-row">
      Straal: <input type="range" id="straal" min="1" max="30" value="5" step="1"
        oninput="document.getElementById('straal-val').textContent=this.value"/>
      <span id="straal-val">5</span> km
    </div>
    <div class="hint" id="hint">Voer een postcode in of gebruik je huidige locatie</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-laag">—</div><div class="stat-lbl">Laagste prijs</div></div>
    <div class="stat"><div class="stat-val" id="s-gem">—</div><div class="stat-lbl">Gemiddeld</div></div>
    <div class="stat"><div class="stat-val" id="s-hoog">—</div><div class="stat-lbl">Hoogste prijs</div></div>
  </div>
  <div class="results-header">
    <span id="count"></span>
    <span id="sort"></span>
  </div>
  <div id="status"><div class="msg">Prijzen laden...</div></div>
  <div class="stations" id="lijst"></div>
  <div class="updated" id="updated"></div>
</div>
<script>
const KLEUREN={shell:{bg:"#FFF8E1",text:"#E65100"},bp:{bg:"#E8F5E9",text:"#1B5E20"},esso:{bg:"#FFEBEE",text:"#B71C1C"},tango:{bg:"#E3F2FD",text:"#0D47A1"},tinq:{bg:"#EDE7F6",text:"#4527A0"},tamoil:{bg:"#FFF3E0",text:"#BF360C"},gulf:{bg:"#F3E5F5",text:"#4A148C"},avia:{bg:"#E0F2F1",text:"#004D40"},texaco:{bg:"#FFECB3",text:"#E65100"},total:{bg:"#E8EAF6",text:"#283593"},q8:{bg:"#FCE4EC",text:"#880E4F"},argos:{bg:"#FBE9E7",text:"#BF360C"},ok:{bg:"#F1F8E9",text:"#33691E"},calpam:{bg:"#E0F7FA",text:"#006064"}};
function kleur(naam){if(!naam)return{bg:"#F5F5F5",text:"#424242"};const n=naam.toLowerCase();for(const[k,v]of Object.entries(KLEUREN))if(n.includes(k))return v;return{bg:"#F5F5F5",text:"#424242"}}
function hav(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}

let stations=[];
let lat=null,lon=null;

async function laad(){
  try{
    const r=await fetch("prijzen.json?t="+Date.now());
    if(!r.ok)throw new Error("niet gevonden");
    const d=await r.json();
    stations=d.stations||[];
    if(d.bijgewerkt)document.getElementById("updated").textContent="Prijzen bijgewerkt op: "+d.bijgewerkt;
    document.getElementById("status").innerHTML=stations.length>0?'<div class="msg">Voer een postcode in om te beginnen</div>':'<div class="err">Nog geen prijzen beschikbaar. Voer de GitHub Actions workflow uit.</div>';
  }catch(e){
    document.getElementById("status").innerHTML='<div class="err">Prijzen nog niet beschikbaar. Voer eerst de workflow uit via GitHub Actions.</div>';
  }
}

function render(){
  if(!lat||stations.length===0)return;
  const bf=document.getElementById("brandstof").value;
  const km=parseInt(document.getElementById("straal").value);
  const labels={EURO95:"Euro 95",DIESEL:"Diesel",AUTOGAS:"LPG",EURO98:"Euro 98"};
  const label=labels[bf]||bf;
  const anders=bf==="DIESEL"?"EURO95":"DIESEL";
  const andersLabel=bf==="DIESEL"?"Euro 95":"Diesel";

  const lijst=stations
    .map(s=>({...s,afstand:hav(lat,lon,s.lat,s.lon),prijs:s.prijzen&&s.prijzen[bf]?s.prijzen[bf]:null}))
    .filter(s=>s.prijs&&s.afstand<=km)
    .sort((a,b)=>a.prijs-b.prijs)
    .slice(0,50);

  if(lijst.length===0){
    document.getElementById("status").innerHTML='<div class="err">Geen stations gevonden binnen '+km+' km. Vergroot de straal.</div>';
    ["s-laag","s-gem","s-hoog"].forEach(id=>document.getElementById(id).textContent="—");
    document.getElementById("count").textContent="";
    document.getElementById("lijst").innerHTML="";
    return;
  }

  document.getElementById("status").innerHTML="";
  const p=lijst.map(s=>s.prijs);
  document.getElementById("s-laag").textContent="€"+Math.min(...p).toFixed(3);
  document.getElementById("s-gem").textContent="€"+(p.reduce((a,b)=>a+b,0)/p.length).toFixed(3);
  document.getElementById("s-hoog").textContent="€"+Math.max(...p).toFixed(3);
  document.getElementById("count").textContent=lijst.length+" tankstations gevonden";
  document.getElementById("sort").textContent="goedkoopste eerst";

  document.getElementById("lijst").innerHTML=lijst.map((s,i)=>{
    const c=kleur(s.naam);
    const ap=s.prijzen&&s.prijzen[anders]?s.prijzen[anders]:null;
    return`<div class="card ${i===0?"cheapest":""}">
      <div class="logo-box" style="background:${c.bg};color:${c.text}">${(s.naam||"?").slice(0,2).toUpperCase()}</div>
      <div class="info">
        <div class="name">${s.naam}${i===0?'<span class="badge">Goedkoopst</span>':''}</div>
        <div class="address">${s.adres}${s.stad?" · "+s.stad:""}</div>
        <div class="dist">${s.afstand.toFixed(1)} km van je locatie</div>
      </div>
      <div class="prices">
        <div class="price-main">€${s.prijs.toFixed(3)}</div>
        <div class="price-lbl">${label} per liter</div>
        ${ap?`<div class="price-other">${andersLabel}: €${ap.toFixed(3)}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

async function doZoek(){
  const q=document.getElementById("zoek").value.trim();
  if(!q)return;
  document.getElementById("status").innerHTML='<div class="msg">Locatie opzoeken...</div>';
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q+", Nederland")+"&format=json&limit=1",{headers:{"Accept-Language":"nl"}});
    const d=await r.json();
    if(!d||!d.length){document.getElementById("status").innerHTML='<div class="err">Locatie niet gevonden.</div>';return;}
    lat=parseFloat(d[0].lat);lon=parseFloat(d[0].lon);
    document.getElementById("hint").textContent="Resultaten voor: "+d[0].display_name.split(",").slice(0,2).join(", ");
    render();
  }catch(e){document.getElementById("status").innerHTML='<div class="err">Er ging iets mis.</div>';}
}

function gebruikLocatie(){
  if(!navigator.geolocation){alert("Locatie niet beschikbaar.");return;}
  document.getElementById("status").innerHTML='<div class="msg">Locatie bepalen...</div>';
  navigator.geolocation.getCurrentPosition(pos=>{
    lat=pos.coords.latitude;lon=pos.coords.longitude;
    document.getElementById("hint").textContent="Resultaten voor je huidige locatie";
    render();
  },()=>{document.getElementById("status").innerHTML='<div class="err">Locatie niet toegestaan.</div>';});
}

document.getElementById("brandstof").addEventListener("change",()=>{if(lat)render()});
document.getElementById("straal").addEventListener("change",()=>{if(lat)render()});
document.getElementById("zoek").addEventListener("keydown",e=>{if(e.key==="Enter")doZoek()});
laad();
</script>
</body>
</html>
